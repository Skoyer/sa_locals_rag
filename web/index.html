<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Scott Adams Locals Micro Lessons Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <noscript>
    <p class="noscript-note">Enable JavaScript to search and filter the lesson library.</p>
  </noscript>

  <header class="page-header">
    <div class="page-shell page-shell--header">
      <div class="page-header__row">
        <div class="page-header__text">
          <h1 class="page-header__title">Scott Adams Locals Micro Lessons Library</h1>
          <p class="page-header__subtitle">
            Browse Micro Lessons by theme, search the library, and open videos on Locals.
          </p>
        </div>
        <div class="page-header__logo-frame">
          <img class="page-header__logo" src="logo.png" alt="Scott Adams Locals Micro Lessons Library logo"/>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-cloud" aria-label="Word cloud overview">
      <div class="page-shell">
        <div class="hero-cloud__frame">
          <img
            class="hero-cloud__img"
            alt="Master word cloud"
            src="../wordclouds/master_wordcloud.png"
            onerror="this.style.display='none'"
          />
        </div>
      </div>
    </section>

    <section class="content-band" aria-label="Library and themes">
      <div class="page-shell page-shell--band">
        <section class="library panel-card" aria-labelledby="lesson-library-heading">
          <div class="panel-card__titlebar">
            <h2 id="lesson-library-heading" class="section-title">Lesson Library</h2>
            <p class="panel-helper">Search and skim all micro-lessons.</p>
            <div id="filter-bar" class="filter-bar" hidden role="status" aria-live="polite"></div>
          </div>

          <div role="search" class="search-panel">
            <label for="lesson-search" class="visually-hidden">Search lessons by title or description</label>
            <div class="search-input-wrap">
              <svg class="search-input-wrap__icon" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
              </svg>
              <input
                type="search"
                id="lesson-search"
                class="search-input-wrap__input"
                placeholder="Search by title or description…"
                autocomplete="off"
                aria-label="Search lessons by title or description"
              />
              <button type="button" id="search-clear" class="search-input-wrap__clear" aria-label="Clear search" hidden>×</button>
            </div>
          </div>

          <div id="lesson-list-empty" class="lesson-list-empty" hidden role="status"></div>
          <ul id="lesson-list" class="lesson-list" role="list"></ul>
        </section>

        <section class="themes panel-card" aria-labelledby="lesson-themes-heading">
          <div class="panel-card__titlebar">
            <h2 id="lesson-themes-heading" class="section-title">Lesson Themes</h2>
            <p class="panel-helper">Explore lessons grouped by theme.</p>
          </div>
          <div id="theme-grid" class="theme-grid"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="page-shell">
      <div id="stats-line" class="site-footer__stats"></div>
      <div id="foot" class="site-footer__gen"></div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
